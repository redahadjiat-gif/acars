{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACARS.COM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/
bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">

</head>
<body>


<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

<div class="container">

{% load static %}

<a class="navbar-brand" href="{% url 'home' %}">
    <img src="{% static 'images/logo.png' %}"
         alt="ACARS"
         height="100">
</a>

<form class="d-flex" action="/search/">

<input class="form-control me-2"
       type="search"
       placeholder="Recherche"
       name="query">

<button class="btn btn-light">
Rechercher
</button>

</form>

</div>

</nav>

<div class="container mt-5">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
.zoom-img {
    cursor: pointer;
    transition: 0.3s;
}

.zoom-img:hover {
    transform: scale(1.02);
}

.vehicle-image{
    width:100%;
    height:500px;
    object-fit:contain;
    background:#f8f9fa;
}

/* ---------- Flèches professionnelles ---------- */

.custom-arrow{
    width:60px;
    height:60px;
    top:50%;
    transform:translateY(-50%);
    opacity:1;
}

.custom-arrow span{

    display:flex;
    align-items:center;
    justify-content:center;

    width:55px;
    height:55px;

    border-radius:50%;

    background:rgba(0,0,0,.65);

    color:white;

    font-size:34px;

    font-weight:bold;

    transition:.3s;
}

.custom-arrow span:hover{

    background:#198754;

    transform:scale(1.15);

    cursor:pointer;
}

.photo-counter{
    position:absolute;
    top:15px;
    right:15px;
    z-index:10;

    background:rgba(0,0,0,.65);
    color:#fff;

    padding:8px 14px;

    border-radius:25px;

    font-size:15px;
    font-weight:bold;
}

</style>

<script>
function openModal(index) {
    let modal = new bootstrap.Modal(document.getElementById('imageModal'));
    modal.show();

    let carousel = new bootstrap.Carousel(document.getElementById('modalCarousel'));
    carousel.to(index);
}
</script>


</body>
</html>
